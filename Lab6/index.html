<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>API Lab</title>
  <link rel="stylesheet" href="css/index.css" />
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="logo">API<span>Lab</span></div>

      <nav class="main-nav" id="main-nav">
        <button class="active" data-api="comments">💬 Комментарии / Посты</button>
        <button data-api="ip">🌍 Моё местоположение (IP)</button>
        <button data-api="faker">🎲 Faker.js — Случайные люди</button>
      </nav>
    </div>
  </header>

  <main class="main-content">

    <section id="section-comments" class="section active">
      <h1 class="section-title">Работа с комментариями</h1>
      <p class="section-desc">CRUD операции с MockAPI (POST, GET, PATCH, DELETE)</p>

      <div id="error-message" class="error"></div>

      <h2>Новый пост</h2>
      <form id="create-form">
        <input id="input-title" type="text" placeholder="Заголовок (от 3 до 100 симв.)" required minlength="3"
          maxlength="100" />
        <br><br>
        <textarea id="input-body" placeholder="Текст поста (от 5 до 1000 симв.)" rows="4" required minlength="5"
          maxlength="1000"></textarea>
        <br><br>
        <button type="submit" class="btn">Создать пост (POST)</button>
      </form>

      <hr>

      <h2>Редактировать пост</h2>
      <form id="edit-form">
        <input id="edit-id" type="number" placeholder="ID поста" required />
        <input id="edit-title" type="text" placeholder="Новый заголовок (от 3 симв.)" minlength="3" maxlength="100" />
        <br><br>
        <button type="submit" class="btn">Сохранить изменения (PATCH)</button>
      </form>

      <hr>

      <h2>Список постов</h2>
      <button onclick="loadPosts()" class="btn ghost">🔄 Обновить список</button>
      <ul id="list"></ul>
    </section>

    <section id="section-ip" class="section">
      <h1 class="section-title">🌍 Моё местоположение</h1>
      <p class="section-desc">Определение геолокации по IP-адресу</p>
      <div style="margin: 2rem 0;">
        <button onclick="getMyLocation()" class="btn">🔍 Определить моё местоположение</button>
      </div>
      <div id="ip-result" class="card" style="display: none; margin-top: 2rem; padding: 1.5rem;"></div>
      <div id="ip-error" class="error" style="display: none; margin-top: 1rem;"></div>
    </section>

    <section id="section-faker" class="section">
      <h1 class="section-title">🎲 Faker.js</h1>
      <p class="section-desc">Создаёт вымышленных пользователей</p>
      <div class="faker-controls"
        style="margin: 2rem 0; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
        <label>Количество людей:</label>
        <select id="faker-count" class="btn ghost" style="padding: 0.65rem 1rem; font-size: 1rem;">
          <option value="1">1 человек</option>
          <option value="2">2 человека</option>
          <option value="3" selected>3 человека</option>
          <option value="5">5 человек</option>
        </select>
        <button onclick="generateFakeUsers()" class="btn">✨ Сгенерировать</button>
        <button onclick="clearFakeUsers()" class="btn ghost">Очистить</button>
      </div>
      <div id="faker-result" class="grid-3" style="margin-top: 2rem;"></div>
    </section>

  </main>

  <script src="js/commets.js"></script>
  <script src="js/ip-api.js"></script>
  <script src="js/faker.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
